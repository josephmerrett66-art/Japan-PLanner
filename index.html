<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Itinerary V16 - Cloud Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: sans-serif; }
        .cb { width: 22px; height: 22px; cursor: pointer; border-radius: 6px; }
        .me-cb { accent-color: #2563eb; }
        .her-cb { accent-color: #db2777; }
        .st { text-decoration: line-through; color: #cbd5e1; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-black text-red-600">🇯🇵 JAPAN 2026</h1>
            <p id="sync-status" class="text-slate-400 font-bold text-[10px] tracking-widest mt-2 uppercase">OFFLINE MODE</p>
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mt-8 text-left">
                <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-200">
                    <span class="text-[9px] font-black text-slate-400 uppercase block">Total</span>
                    <span id="s-total" class="text-lg font-black">$0.00</span>
                </div>
                <div class="bg-blue-50 p-4 rounded-3xl shadow-sm border border-blue-100">
                    <span class="text-[9px] font-black text-blue-500 uppercase block">Joe Paid</span>
                    <span id="s-me" class="text-lg font-black text-blue-600">$0.00</span>
                </div>
                <div class="bg-pink-50 p-4 rounded-3xl shadow-sm border border-pink-100">
                    <span class="text-[9px] font-black text-pink-500 uppercase block">Partner Paid</span>
                    <span id="s-her" class="text-lg font-black text-pink-600">$0.00</span>
                </div>
                <div class="bg-red-50 p-4 rounded-3xl shadow-sm border border-red-100">
                    <span class="text-[9px] font-black text-red-500 uppercase block">Remaining</span>
                    <span id="s-owed" class="text-lg font-black text-red-600">$0.00</span>
                </div>
            </div>
        </header>

        <div id="list" class="space-y-6"></div>
        
        <div class="mt-12 p-8 bg-slate-900 rounded-[2.5rem] text-white shadow-2xl">
             <div class="flex items-center gap-3 mb-4">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <h3 class="text-xs font-black uppercase tracking-widest">Live Sync Setup</h3>
             </div>
             <p class="text-[11px] text-slate-400 mb-6 leading-relaxed">Enter a unique <b>Trip Key</b> below on both phones to stay in sync. Use something unique like your names + the year.</p>
             <div class="flex flex-col gap-3">
                <input type="text" id="trip-key" placeholder="Enter Secret Trip Key..." class="bg-slate-800 border-none rounded-2xl p-4 text-sm outline-none text-blue-400 font-mono">
                <button onclick="initCloud()" class="bg-blue-600 hover:bg-blue-500 transition-colors py-4 rounded-2xl text-xs font-black tracking-widest">ACTIVATE CLOUD SYNC</button>
             </div>
        </div>
    </div>

    <script>
        let data = [
            {"day": "Day 1", "date": "Sat 25th", "title": "MELBOURNE TO TOKYO", "details": [{"text": "Flight JQ34", "cost": 0, "paidMe": false, "paidPartner": false}]},
            {"day": "Day 7", "date": "Fri 1st", "title": "SHIZUOKA", "details": [{"text": "Koko Hotel", "cost": 304, "paidMe": false, "paidPartner": false}, {"text": "Nihondaira Plateau", "cost": 0, "paidMe": false, "paidPartner": false}]}
        ];
        
        let tripId = localStorage.getItem('tripId') || "";
        document.getElementById('trip-key').value = tripId;

        // Using a free, simple JSON storage API
        const API_URL = "https://kvbin.com/api/v1/bins/";

        async function initCloud() {
            const key = document.getElementById('trip-key').value.trim();
            if(!key) return alert("Please enter a key.");
            tripId = key;
            localStorage.setItem('tripId', key);
            document.getElementById('sync-status').innerText = "CONNECTING...";
            await pullData();
            setInterval(pullData, 8000); // Check for updates every 8 seconds
        }

        async function pushData() {
            if(!tripId) return;
            try {
                await fetch(API_URL + tripId, {
                    method: 'POST',
                    body: JSON.stringify(data),
                    headers: { 'Content-Type': 'application/json' }
                });
                document.getElementById('sync-status').innerText = "LIVE SYNC ACTIVE ✅";
            } catch(e) { document.getElementById('sync-status').innerText = "SYNC ERROR"; }
        }

        async function pullData() {
            if(!tripId) return;
            try {
                const res = await fetch(API_URL + tripId);
                if(res.ok) {
                    const remoteData = await res.json();
                    if(JSON.stringify(remoteData) !== JSON.stringify(data)) {
                        data = remoteData;
                        render();
                        calc();
                    }
                    document.getElementById('sync-status').innerText = "LIVE SYNC ACTIVE ✅";
                }
            } catch(e) { console.error("Pull failed", e); }
        }

        function calc() {
            let t=0, m=0, h=0, paid=0;
            data.forEach(d => {
                d.details.forEach(i => {
                    let c = parseFloat(i.cost || 0); t += c;
                    if(i.paidMe && i.paidPartner) { m+=c/2; h+=c/2; paid+=c; }
                    else if(i.paidMe) { m+=c; paid+=c; }
                    else if(i.paidPartner) { h+=c; paid+=c; }
                });
            });
            document.getElementById('s-total').innerText = '$' + t.toFixed(2);
            document.getElementById('s-me').innerText = '$' + m.toFixed(2);
            document.getElementById('s-her').innerText = '$' + h.toFixed(2);
            document.getElementById('s-owed').innerText = '$' + (t-paid).toFixed(2);
        }

        function toggle(d, i, f) {
            data[d].details[i][f] = !data[d].details[i][f];
            render();
            calc();
            pushData();
        }

        function updateI(d, i, f, v) {
            data[d].details[i][f] = (f === 'cost') ? parseFloat(v) || 0 : v;
            calc();
            pushData();
        }

        function render() {
            const list = document.getElementById('list');
            list.innerHTML = '';
            data.forEach((day, dIdx) => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden";
                let rows = day.details.map((item, iIdx) => `
                    <div class="border-b border-slate-50 last:border-0 p-5 flex items-center gap-4">
                         <div class="flex gap-2">
                            <input type="checkbox" class="cb me-cb" ${item.paidMe ? 'checked' : ''} onchange="toggle(${dIdx}, ${iIdx}, 'paidMe')">
                            <input type="checkbox" class="cb her-cb" ${item.paidPartner ? 'checked' : ''} onchange="toggle(${dIdx}, ${iIdx}, 'paidPartner')">
                         </div>
                         <div class="flex-1">
                            <input type="text" value="${item.text}" onchange="updateI(${dIdx}, ${iIdx}, 'text', this.value)" class="w-full font-bold text-xs outline-none bg-transparent ${item.paidMe || item.paidPartner ? 'st' : ''}">
                         </div>
                         <div class="flex items-center gap-1 font-mono font-black text-xs text-slate-500">
                            <span>$</span>
                            <input type="number" value="${item.cost}" onchange="updateI(${dIdx}, ${iIdx}, 'cost', this.value)" class="w-14 text-right outline-none bg-transparent">
                         </div>
                    </div>
                `).join('');
                card.innerHTML = `<div class="bg-slate-50 px-6 py-4 border-b border-slate-100 font-black text-slate-400 uppercase text-[9px] tracking-widest">${day.day} • ${day.title}</div><div>${rows}</div>`;
                list.appendChild(card);
            });
        }

        render();
        calc();
        if(tripId) initCloud();
    </script>
</body>
</html>
