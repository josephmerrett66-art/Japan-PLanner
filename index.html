<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Japan 2025 — Joe &amp; Beth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

/* ── Reset & tokens ─────────────────────────────────────────────────────────── */
:root {
  --bg:        #f0f2f6;
  --surface:   #ffffff;
  --surface2:  #f7f8fb;
  --dark:      #0d1117;
  --dark2:     #161b22;
  --dark3:     #21262d;
  --dark4:     #30363d;
  --muted:     #58637a;
  --muted2:    #8b95a9;
  --muted3:    #c4cad6;
  --muted4:    #e1e6ef;
  --muted5:    #f0f3f8;
  --border:    #e4e9f2;
  --blue:      #3b82f6;
  --purple:    #7c3aed;
  --green:     #059669;
  --green-bg:  #ecfdf5;
  --green-bd:  #a7f3d0;
  --red:       #dc2626;
  --amber:     #d97706;
  --shadow-1:  0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-2:  0 4px 16px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  --r-2xl: 22px;
  --r-xl:  16px;
  --r-lg:  12px;
  --r-md:  8px;
  --r-sm:  6px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--dark);
  min-height: 100vh;
  padding-bottom: 110px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
input, textarea, select, button, label {
  font-family: 'DM Sans', sans-serif;
  outline: none;
  -webkit-tap-highlight-color: transparent;
}
input::placeholder, textarea::placeholder { color: var(--muted3); }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-thumb { background: var(--muted4); border-radius: 4px; }

/* ── Header ─────────────────────────────────────────────────────────────────── */
.header {
  background: var(--dark);
  padding: 16px 20px 14px;
  padding-top: max(16px, env(safe-area-inset-top, 16px));
  position: sticky; top: 0; z-index: 60;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.header-inner {
  max-width: 860px; margin: 0 auto;
  display: flex; align-items: center;
  justify-content: space-between; gap: 12px;
}
.header-eyebrow {
  font-family: 'DM Mono', monospace; font-size: 8.5px;
  letter-spacing: 0.2em; color: #3d4d63;
  text-transform: uppercase; margin-bottom: 5px;
}
.header-title {
  font-size: 22px; font-weight: 700; color: #f0f4f8;
  letter-spacing: -0.02em; line-height: 1.15;
}
.header-sub {
  margin-top: 3px; font-size: 11.5px; color: #3d4d63;
  font-weight: 400; letter-spacing: 0.01em;
}
.header-chips { display: flex; gap: 6px; flex-shrink: 0; }
.header-chip {
  background: var(--dark2); border-radius: var(--r-lg);
  padding: 7px 12px; text-align: center;
  border: 1px solid rgba(255,255,255,0.05);
}
.chip-label {
  font-family: 'DM Mono', monospace; font-size: 7px;
  color: #3d4d63; letter-spacing: 0.16em;
  text-transform: uppercase; margin-bottom: 3px;
}
.chip-value {
  font-family: 'DM Mono', monospace; font-size: 15px;
  font-weight: 600; color: #e8edf4; line-height: 1;
}
.chip-value.green { color: #34d399; }

/* ── Nav ─────────────────────────────────────────────────────────────────────── */
.nav {
  background: var(--dark2);
  padding: 0 20px;
  display: flex;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.nav::-webkit-scrollbar { display: none; }
.nav-inner { max-width: 860px; margin: 0 auto; display: flex; }
.tab-btn {
  background: transparent; border: none;
  border-bottom: 2px solid transparent;
  color: #3d4d63; cursor: pointer;
  font-size: 10.5px; font-weight: 600;
  letter-spacing: 0.08em; padding: 12px 16px;
  transition: color 0.15s, border-color 0.15s;
  white-space: nowrap; text-transform: uppercase;
  font-family: 'DM Mono', monospace;
}
.tab-btn.active { color: #e8edf4; border-bottom-color: var(--blue); }

/* ── Toolbar ─────────────────────────────────────────────────────────────────── */
.toolbar {
  background: var(--dark2); padding: 8px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.toolbar-inner {
  max-width: 860px; margin: 0 auto;
  display: flex; gap: 7px; align-items: center;
}
.toolbar-btn {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--dark3); border: 1px solid var(--dark4);
  border-radius: var(--r-md); color: #8b95a9; cursor: pointer;
  font-size: 10.5px; font-weight: 600; letter-spacing: 0.05em;
  padding: 8px 15px; transition: all 0.15s; text-transform: uppercase;
  white-space: nowrap; min-height: 36px;
}
.toolbar-btn:active { opacity: 0.75; transform: scale(0.97); }
.toolbar-btn.primary { background: var(--blue); border-color: var(--blue); color: #fff; }

/* ── Tabs ─────────────────────────────────────────────────────────────────────── */
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── Main ────────────────────────────────────────────────────────────────────── */
.main { max-width: 860px; margin: 0 auto; padding: 14px 12px 20px; }

/* ── Day card ────────────────────────────────────────────────────────────────── */
.day-card {
  background: var(--surface);
  border-radius: var(--r-2xl);
  margin-bottom: 10px;
  overflow: hidden;
  box-shadow: var(--shadow-1);
  border: 1px solid var(--border);
}

.day-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 15px 18px 13px;
  border-bottom: 1px solid var(--muted5);
  cursor: pointer; user-select: none; gap: 10px;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.1s;
}
.day-header:active { background: var(--muted5); }
.day-header-left { flex: 1; min-width: 0; }

.day-meta { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
.day-num {
  font-family: 'DM Mono', monospace; font-size: 8px; font-weight: 500;
  letter-spacing: 0.12em; text-transform: uppercase;
  background: var(--dark); color: rgba(255,255,255,0.9);
  border-radius: 4px; padding: 2px 7px; flex-shrink: 0;
}
.day-date {
  font-family: 'DM Mono', monospace; font-size: 9.5px;
  color: var(--muted2); letter-spacing: 0.03em;
}

.day-city-input {
  background: transparent; border: none; color: var(--dark);
  font-size: 17px; font-weight: 700; letter-spacing: -0.02em;
  width: 100%; line-height: 1.2;
  -webkit-appearance: none;
}
.day-city-input::placeholder { color: var(--muted4); }

.day-header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.day-total {
  font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500;
  color: var(--muted); background: var(--muted5);
  border-radius: var(--r-sm); padding: 4px 10px; white-space: nowrap;
  border: 1px solid var(--border);
}
.add-btn {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--dark); border: none; color: #fff;
  font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; line-height: 1; transition: transform 0.1s, background 0.15s;
}
.add-btn:active { transform: scale(0.9); background: var(--dark3); }

.collapse-icon {
  color: var(--muted3); font-size: 10px; transition: transform 0.22s;
  flex-shrink: 0; width: 16px; text-align: center;
}
.collapsed .collapse-icon { transform: rotate(-90deg); }

/* ── Day body ─────────────────────────────────────────────────────────────────── */
.day-body { padding: 10px 12px 14px; }
.free-day-msg {
  text-align: center; font-family: 'DM Mono', monospace;
  font-size: 9px; letter-spacing: 0.14em; color: var(--muted3);
  text-transform: uppercase; padding: 22px 16px;
}

/* ── Entry row ───────────────────────────────────────────────────────────────── */
.entry-row {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--r-xl); margin-bottom: 7px; overflow: hidden;
  transition: border-color 0.15s, box-shadow 0.15s;
  animation: fadeUp 0.15s ease forwards;
}
.entry-row:focus-within { border-color: var(--muted3); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.entry-row.paid-row { background: var(--green-bg); border-color: var(--green-bd); }

/* Top row: full-width flex */
.entry-top {
  display: flex; align-items: center; gap: 0;
  padding: 11px 13px 0;
}
/* Bottom row */
.entry-bottom {
  display: flex; align-items: center;
  padding: 7px 13px 10px; gap: 0;
}

/* Checks */
.entry-checks { display: flex; gap: 5px; margin-right: 9px; flex-shrink: 0; }
.check-box {
  width: 24px; height: 24px; border-radius: 7px;
  border: 2px solid var(--muted4); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0; background: var(--surface);
}
.check-box.joe.checked  { border-color: var(--blue);   background: var(--blue); }
.check-box.beth.checked { border-color: var(--purple); background: var(--purple); }
.check-box svg { display: none; }
.check-box.checked svg { display: block; }

/* Category */
.entry-cat { display: flex; align-items: center; gap: 5px; margin-right: 9px; flex-shrink: 0; }
.cat-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.cat-select {
  background: transparent; border: none;
  font-family: 'DM Mono', monospace; font-size: 8.5px; font-weight: 600;
  letter-spacing: 0.09em; text-transform: uppercase; cursor: pointer;
  appearance: none; -webkit-appearance: none; color: inherit;
  max-width: 68px; padding: 0;
}
.cat-select option { background: #fff; color: var(--dark); }

.entry-vdiv { width: 1px; height: 16px; background: var(--border); margin: 0 9px; flex-shrink: 0; }

/* Name */
.entry-name {
  flex: 1; min-width: 0; background: transparent; border: none;
  color: var(--dark); font-size: 14px; font-weight: 400; line-height: 1.3;
  -webkit-appearance: none;
}

/* Price row */
.entry-price-wrap { display: flex; align-items: center; gap: 3px; flex: 1; }
.price-prefix { font-family: 'DM Mono', monospace; font-size: 9.5px; color: var(--muted3); }
.entry-price {
  background: transparent; border: none; color: var(--dark);
  font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500;
  width: 90px; -webkit-appearance: none;
}

/* Actions */
.entry-actions { display: flex; align-items: center; gap: 6px; margin-left: auto; flex-shrink: 0; }
.paid-badge {
  display: inline-flex; align-items: center;
  background: #d1fae5; border: 1px solid var(--green-bd); color: #065f46;
  border-radius: 5px; font-family: 'DM Mono', monospace; font-size: 8.5px;
  font-weight: 700; letter-spacing: 0.06em; padding: 3px 8px;
  white-space: nowrap; flex-shrink: 0;
}
.notes-toggle {
  background: transparent; border: 1px solid var(--muted4);
  border-radius: var(--r-sm); color: var(--muted2); cursor: pointer;
  font-size: 10px; font-weight: 500; padding: 5px 10px;
  white-space: nowrap; min-height: 30px; transition: all 0.12s;
}
.notes-toggle:active { background: var(--muted5); }
.del-btn {
  background: none; border: none; color: var(--muted3);
  cursor: pointer; font-size: 20px; line-height: 1;
  min-width: 32px; min-height: 32px;
  display: flex; align-items: center; justify-content: center;
  transition: color 0.15s;
}
.del-btn:active { color: var(--red); }

.notes-area {
  background: transparent; border: none; border-top: 1px solid var(--border);
  color: var(--muted); font-size: 13px; font-style: italic;
  width: 100%; resize: none; line-height: 1.6;
  padding: 10px 13px; display: none; -webkit-appearance: none;
}
.notes-area.visible { display: block; animation: fadeUp 0.15s ease; }

/* ── Day footer ──────────────────────────────────────────────────────────────── */
.day-footer {
  display: flex; align-items: center; gap: 8px;
  margin-top: 8px; padding: 0 2px;
}
.legend { display: flex; gap: 10px; flex: 1; align-items: center; }
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-dot { width: 7px; height: 7px; border-radius: 50%; }
.legend-label {
  font-family: 'DM Mono', monospace; font-size: 9px;
  color: var(--muted2); letter-spacing: 0.03em;
}
.add-entry-btn {
  display: flex; align-items: center; gap: 5px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-md); color: var(--muted2); cursor: pointer;
  font-size: 12px; font-weight: 500; padding: 8px 14px;
  white-space: nowrap; min-height: 36px; transition: all 0.12s;
}
.add-entry-btn:active { background: var(--muted5); }

/* ── Summary bar ─────────────────────────────────────────────────────────────── */
.summary-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(13,17,23,0.97);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,255,255,0.07);
  display: flex; align-items: stretch; justify-content: center;
  z-index: 100; overflow-x: auto; -webkit-overflow-scrolling: touch;
  padding-bottom: env(safe-area-inset-bottom, 0px);
  box-shadow: 0 -8px 32px rgba(0,0,0,0.2);
}
.summary-bar::-webkit-scrollbar { display: none; }
.sum-item {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 10px 14px; gap: 3px; flex-shrink: 0;
}
.sum-divider { width: 1px; background: rgba(255,255,255,0.07); margin: 8px 0; flex-shrink: 0; }
.sum-label {
  font-family: 'DM Mono', monospace; font-size: 6.5px;
  letter-spacing: 0.18em; color: #3d4d63;
  text-transform: uppercase; white-space: nowrap;
}
.sum-value {
  font-family: 'DM Mono', monospace; font-size: 14px;
  font-weight: 600; white-space: nowrap; color: #e8edf4;
}
.sum-value.joe    { color: #60a5fa; }
.sum-value.beth   { color: #a78bfa; }
.sum-value.owed   { color: #f87171; }
.sum-value.bal    { font-size: 10.5px; font-family: 'DM Sans', sans-serif; font-weight: 600; color: #e8edf4; }
.sum-value.sq     { color: #34d399; }
.sum-value.amber  { color: #fbbf24; }

/* ── Toast ──────────────────────────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 78px; left: 50%;
  transform: translateX(-50%) translateY(6px);
  background: var(--dark3); color: #e8edf4;
  font-size: 13px; font-weight: 500; padding: 9px 18px;
  border-radius: var(--r-lg); box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  opacity: 0; transition: opacity 0.18s, transform 0.18s;
  pointer-events: none; z-index: 200; white-space: nowrap;
  border: 1px solid var(--dark4);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Prompt builder ─────────────────────────────────────────────────────────── */
.prompt-main { max-width: 860px; margin: 0 auto; padding: 14px 12px 110px; }
.prompt-intro {
  background: var(--surface); border-radius: var(--r-2xl);
  padding: 16px 18px; margin-bottom: 14px;
  box-shadow: var(--shadow-1); border: 1px solid var(--border);
  font-size: 13.5px; color: var(--muted); line-height: 1.7;
}
.prompt-intro strong { color: var(--dark); font-weight: 600; }
.prompt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media (max-width: 540px) { .prompt-grid { grid-template-columns: 1fr; } }

.prompt-card {
  background: var(--surface); border-radius: var(--r-xl);
  box-shadow: var(--shadow-1); overflow: hidden;
  border: 1px solid var(--border);
}
.prompt-card-header {
  padding: 14px 16px 12px; border-bottom: 1px solid var(--muted5);
  display: flex; align-items: flex-start; gap: 11px;
}
.prompt-icon {
  width: 34px; height: 34px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; flex-shrink: 0;
}
.prompt-card-title { font-size: 13.5px; font-weight: 600; color: var(--dark); margin-bottom: 3px; }
.prompt-card-desc  { font-size: 11.5px; color: var(--muted2); line-height: 1.55; }
.prompt-card-body  { padding: 12px 16px 14px; }
.prompt-preview {
  background: var(--muted5); border: 1px solid var(--border);
  border-radius: var(--r-md); padding: 10px 12px;
  font-family: 'DM Mono', monospace; font-size: 10px;
  color: var(--muted2); line-height: 1.7;
  max-height: 96px; overflow: hidden;
  position: relative; margin-bottom: 10px;
  white-space: pre-wrap; word-break: break-word;
}
.prompt-preview::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 28px;
  background: linear-gradient(transparent, var(--muted5));
  pointer-events: none;
}
.copy-btn {
  width: 100%; padding: 12px;
  background: var(--dark); border: none; border-radius: var(--r-md);
  color: #e8edf4; cursor: pointer; font-size: 13px; font-weight: 600;
  letter-spacing: 0.03em; transition: all 0.15s;
  min-height: 44px;
}
.copy-btn:active { background: var(--dark3); transform: scale(0.98); }
.copy-btn.copied { background: var(--green); color: #fff; }

/* ── Animations ──────────────────────────────────────────────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

</style>

</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-inner">
    <div>
      <div class="header-eyebrow">Trip Planner · Japan 2025</div>
      <div class="header-title">🇯🇵 Japan 2025</div>
      <div class="header-sub">Joe &amp; Beth &middot; 25 Apr – 10 May &middot; 16 days</div>
    </div>
    <div class="header-chips">
      <div class="header-chip">
        <div class="chip-label">Planned</div>
        <div class="chip-value" id="hdr-planned">0/16</div>
      </div>
      <div class="header-chip">
        <div class="chip-label">Total</div>
        <div class="chip-value green" id="hdr-total">$0</div>
      </div>
    </div>
  </div>
</div>

<!-- Nav -->
<div class="nav">
  <div class="nav-inner">
    <button class="tab-btn active" onclick="switchTab('itinerary', this)">📅 Itinerary</button>
    <button class="tab-btn" onclick="switchTab('prompts', this)">✦ Prompt Builder</button>
  </div>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <div class="toolbar-inner">
    <button class="toolbar-btn primary" onclick="exportJSON()">⬇ Export JSON</button>
    <label class="toolbar-btn" for="import-file" style="cursor:pointer;">⬆ Import JSON</label>
    <input type="file" id="import-file" accept=".json" style="position:absolute;width:1px;height:1px;opacity:0;overflow:hidden;z-index:-1;" onchange="importJSON(event)">
  </div>
</div>

<!-- Itinerary tab -->
<div class="tab-panel active" id="tab-itinerary">
  <div class="main" id="days-container"></div>
</div>

<!-- Prompt Builder tab -->
<div class="tab-panel" id="tab-prompts">
  <div class="prompt-main" id="prompt-main"></div>
</div>

<!-- Summary bar -->
<div class="summary-bar">
  <div class="sum-item"><div class="sum-label">Total</div><div class="sum-value" id="sum-total">$0.00</div></div>
  <div class="sum-divider"></div>
  <div class="sum-item"><div class="sum-label">Joe</div><div class="sum-value joe" id="sum-joe">$0.00</div></div>
  <div class="sum-divider"></div>
  <div class="sum-item"><div class="sum-label">Beth</div><div class="sum-value beth" id="sum-beth">$0.00</div></div>
  <div class="sum-divider"></div>
  <div class="sum-item"><div class="sum-label">Owed</div><div class="sum-value owed" id="sum-owed">$0.00</div></div>
  <div class="sum-divider"></div>
  <div class="sum-item"><div class="sum-label">Balance</div><div class="sum-value bal sq" id="sum-bal">All square ✓</div></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>

// ── Config ──────────────────────────────────────────────────────────────────
const TRIP_START  = new Date('2025-04-25');
const TOTAL_DAYS  = 16;
const STORAGE_KEY = 'japan-planner-v4';

const WEEKDAYS  = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const WEEKDAYS_FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS    = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTHS_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];

const DAYS = Array.from({ length: TOTAL_DAYS }, (_, i) => {
  const d = new Date(TRIP_START);
  d.setDate(d.getDate() + i);
  const wd = d.getDay(), day = d.getDate(), mo = d.getMonth(), yr = d.getFullYear();
  return {
    index:   i,
    short:   WEEKDAYS[wd],
    dayNum:  day,
    month:   MONTHS[mo],
    full:    WEEKDAYS_FULL[wd] + ', ' + day + ' ' + MONTHS_FULL[mo],
    display: (day + ' ' + MONTHS_FULL[mo] + ' ' + yr).toUpperCase(),
  };
});

const CATS = {
  transport:     { label: 'Transport', color: '#3b82f6' },
  accommodation: { label: 'Stay',      color: '#8b5cf6' },
  activity:      { label: 'Activity',  color: '#10b981' },
};

// ── State ───────────────────────────────────────────────────────────────────
let state = { days: DAYS.map(d => ({ index: d.index, city: '', entries: [], _collapsed: false })) };

const uid = () => Math.random().toString(36).slice(2);
const fmt = n  => `$${(+n || 0).toFixed(2)}`;
const esc = s  => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ── Persistence ─────────────────────────────────────────────────────────────
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}
function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) {
      const parsed = JSON.parse(s);
      if (parsed.days) {
        parsed.days.forEach(saved => {
          const idx = state.days.findIndex(d => d.index === saved.index);
          if (idx !== -1) state.days[idx] = { ...state.days[idx], ...saved };
        });
      }
    }
  } catch {}
}

// ── Export / Import ──────────────────────────────────────────────────────────
function exportJSON() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'japan-trip-2025.json';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('✓ Exported successfully');
}
function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const parsed = JSON.parse(ev.target.result);
      if (parsed.days && Array.isArray(parsed.days)) {
        state = parsed;
        saveState();
        render();
        showToast('✓ Imported successfully');
      } else {
        showToast('⚠ Invalid file format');
      }
    } catch { showToast('⚠ Could not parse file'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ── Toast ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function getDay(i)    { return state.days.find(d => d.index === i); }
function setDay(day)  { state.days = state.days.map(d => d.index === day.index ? day : d); saveState(); }
function getEntry(di, eid) { return getDay(di).entries.find(e => e.id === eid); }
function setEntry(di, entry) {
  const day = getDay(di);
  day.entries = day.entries.map(e => e.id === entry.id ? entry : e);
  setDay(day);
}

// ── Render ───────────────────────────────────────────────────────────────────
function render() {
  const container = document.getElementById('days-container');
  container.innerHTML = '';
  state.days.forEach(day => container.appendChild(buildDayCard(day.index)));
  updateSummary();
}

function refreshDayCard(di) {
  const container = document.getElementById('days-container');
  const old = document.getElementById(`day-${di}`);
  if (old) container.replaceChild(buildDayCard(di), old);
  updateSummary();
}

// ── Day card ──────────────────────────────────────────────────────────────────
function buildDayCard(di) {
  const day  = getDay(di);
  const info = DAYS[di];
  const total = day.entries.reduce((s, e) => s + (+e.price || 0), 0);
  const collapsed = !!day._collapsed;

  const card = document.createElement('div');
  card.className = 'day-card' + (collapsed ? ' collapsed' : '');
  card.id = `day-${di}`;

  const hdr = document.createElement('div');
  hdr.className = 'day-header';
  hdr.innerHTML = `
    <div class="day-header-left">
      <div class="day-meta">
        <span class="day-num">Day ${di + 1}</span>
        <span class="day-date">${info.display}</span>
      </div>
      <input class="day-city-input" placeholder="City or area..." value="${esc(day.city)}" />
    </div>
    <div class="day-header-right">
      ${total > 0 ? `<div class="day-total">${fmt(total)}</div>` : ''}
      <button class="add-btn" title="Add entry">+</button>
      <div class="collapse-icon">▾</div>
    </div>`;

  hdr.querySelector('.day-city-input').addEventListener('click', e => e.stopPropagation());
  hdr.querySelector('.day-city-input').addEventListener('input', e => {
    const d = getDay(di); d.city = e.target.value; setDay(d); updateSummary();
  });
  hdr.querySelector('.add-btn').addEventListener('click', e => {
    e.stopPropagation(); addEntry(di);
  });
  hdr.addEventListener('click', () => toggleCollapse(di));
  card.appendChild(hdr);

  const body = document.createElement('div');
  body.className = 'day-body';
  body.id = `day-body-${di}`;
  body.style.display = collapsed ? 'none' : 'block';

  if (day.entries.length === 0) {
    body.innerHTML = '<div class="free-day-msg">Free day — nothing planned yet</div>';
  } else {
    day.entries.forEach(entry => body.appendChild(buildEntryRow(di, entry.id)));
  }

  const footer = document.createElement('div');
  footer.className = 'day-footer';
  footer.innerHTML = `
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div><span class="legend-label">Joe</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:#7c3aed"></div><span class="legend-label">Beth</span></div>
    </div>
    <button class="add-entry-btn" id="add-footer-${di}">+ Add entry</button>`;
  footer.querySelector(`#add-footer-${di}`).addEventListener('click', () => addEntry(di));
  body.appendChild(footer);
  card.appendChild(body);
  return card;
}

// ── Entry row ─────────────────────────────────────────────────────────────────
function buildEntryRow(di, eid) {
  const entry  = getEntry(di, eid);
  const cat    = CATS[entry.category];
  const isPaid = entry.joePaid || entry.bethPaid;

  const row = document.createElement('div');
  row.className = 'entry-row' + (isPaid ? ' paid-row' : '');
  row.id = `entry-${eid}`;

  const main = document.createElement('div');
  main.className = 'entry-main-wrap';
  main.innerHTML = `
    <div class="entry-top">
      <div class="entry-checks">
        <div class="check-box joe ${entry.joePaid ? 'checked':''}" data-who="joe" title="Joe paid">
          <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="check-box beth ${entry.bethPaid ? 'checked':''}" data-who="beth" title="Beth paid">
          <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
      <div class="entry-cat">
        <div class="cat-dot" style="background:${cat.color}"></div>
        <select class="cat-select" style="color:${cat.color}">
          ${Object.entries(CATS).map(([k,v])=>`<option value="${k}"${entry.category===k?' selected':''}>${v.label}</option>`).join('')}
        </select>
      </div>
      <div class="entry-vdiv"></div>
      <input class="entry-name" placeholder="Description..." value="${esc(entry.name)}" />
    </div>
    <div class="entry-bottom">
      <div class="entry-price-wrap">
        <span class="price-prefix">A$</span>
        <input class="entry-price" type="number" min="0" step="0.01" placeholder="0.00" value="${entry.price||''}">
      </div>
      <div class="entry-actions">
        ${isPaid ? '<span class="paid-badge">✓ paid</span>' : ''}
        <button class="notes-toggle">${entry.notes ? '− notes' : '+ notes'}</button>
        <button class="del-btn" title="Remove">×</button>
      </div>
    </div>`;

  main.querySelectorAll('.check-box').forEach(cb => {
    cb.addEventListener('click', () => {
      const e = getEntry(di, eid);
      const field = cb.dataset.who === 'joe' ? 'joePaid' : 'bethPaid';
      e[field] = !e[field];
      setEntry(di, e);
      refreshDayCard(di);
      updateSummary();
    });
  });

  main.querySelector('.cat-select').addEventListener('change', ev => {
    const e = getEntry(di, eid); e.category = ev.target.value; setEntry(di, e);
    refreshDayCard(di);
  });

  main.querySelector('.entry-name').addEventListener('input', ev => {
    const e = getEntry(di, eid); e.name = ev.target.value; setEntry(di, e); updateSummary();
  });

  main.querySelector('.entry-price').addEventListener('input', ev => {
    const e = getEntry(di, eid); e.price = ev.target.value; setEntry(di, e); updateSummary();
  });

  main.querySelector('.notes-toggle').addEventListener('click', () => {
    const na = row.querySelector('.notes-area');
    const visible = na.classList.toggle('visible');
    main.querySelector('.notes-toggle').textContent = visible ? '− notes' : '+ notes';
  });

  main.querySelector('.del-btn').addEventListener('click', () => {
    const d = getDay(di);
    d.entries = d.entries.filter(e => e.id !== eid);
    setDay(d);
    refreshDayCard(di);
    updateSummary();
  });

  row.appendChild(main);

  const na = document.createElement('textarea');
  na.className = 'notes-area' + (entry.notes ? ' visible' : '');
  na.rows = 2;
  na.placeholder = 'Notes, booking ref, confirmation number...';
  na.value = entry.notes || '';
  na.addEventListener('input', ev => {
    const e = getEntry(di, eid); e.notes = ev.target.value; setEntry(di, e);
  });
  row.appendChild(na);

  return row;
}

// ── Interactions ──────────────────────────────────────────────────────────────
function toggleCollapse(di) {
  const day = getDay(di);
  day._collapsed = !day._collapsed;
  setDay(day);
  const card = document.getElementById(`day-${di}`);
  const body = document.getElementById(`day-body-${di}`);
  card.classList.toggle('collapsed', day._collapsed);
  body.style.display = day._collapsed ? 'none' : 'block';
}

function addEntry(di) {
  const day = getDay(di);
  if (day._collapsed) { day._collapsed = false; setDay(day); }
  day.entries.push({ id: uid(), category: 'activity', name: '', price: '', joePaid: false, bethPaid: false, notes: '' });
  setDay(day);
  refreshDayCard(di);
  updateSummary();
}

// ── Summary ───────────────────────────────────────────────────────────────────
function updateSummary() {
  const all   = state.days.flatMap(d => d.entries);
  const total = all.reduce((s, e) => s + (+e.price || 0), 0);
  const joe   = all.filter(e => e.joePaid).reduce((s, e) => s + (+e.price || 0), 0);
  const beth  = all.filter(e => e.bethPaid).reduce((s, e) => s + (+e.price || 0), 0);
  const owed  = Math.max(0, total - joe - beth);
  const diff  = joe - beth;
  const bal   = diff === 0
    ? 'All square ✓'
    : diff > 0 ? `Beth owes Joe ${fmt(Math.abs(diff) / 2)}`
    : `Joe owes Beth ${fmt(Math.abs(diff) / 2)}`;
  const planned = state.days.filter(d => d.entries.length > 0).length;

  document.getElementById('sum-total').textContent   = fmt(total);
  document.getElementById('sum-joe').textContent     = fmt(joe);
  document.getElementById('sum-beth').textContent    = fmt(beth);
  document.getElementById('sum-owed').textContent    = fmt(owed);
  document.getElementById('hdr-planned').textContent = `${planned}/${TOTAL_DAYS}`;
  document.getElementById('hdr-total').textContent   = fmt(total);

  const balEl = document.getElementById('sum-bal');
  balEl.textContent = bal;
  balEl.className   = `sum-value bal ${diff === 0 ? 'sq' : 'amber'}`;
}

// ── Tabs ─────────────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'prompts') renderPrompts();
}

// ── Prompt builder ────────────────────────────────────────────────────────────
function buildTripSummary() {
  const lines = [];
  state.days.forEach(day => {
    const info = DAYS[day.index];
    const entries = day.entries.map(e =>
      `    - [${CATS[e.category].label}] ${e.name || '(unnamed)'}${e.price ? ' — A$' + e.price : ''}${e.joePaid || e.bethPaid ? ' ✓ paid by ' + (e.joePaid ? 'Joe' : '') + (e.bethPaid ? (e.joePaid ? ' & ' : '') + 'Beth' : '') : ''}`
    ).join('\n');
    lines.push(`Day ${day.index + 1} — ${info.full}${day.city ? ' (' + day.city + ')' : ' (city TBD)'}\n${entries || '    (nothing planned yet)'}`);
  });
  return lines.join('\n\n');
}

function buildCurrentJSON() {
  return JSON.stringify(state, null, 2);
}

function renderPrompts() {
  const el = document.getElementById('prompt-main');
  el.innerHTML = '';

  const intro = document.createElement('div');
  intro.className = 'prompt-intro';
  intro.innerHTML = `<strong>How it works:</strong> Each prompt below is pre-loaded with your current trip data. Tap <strong>Copy Prompt</strong>, paste it into any AI (ChatGPT, Claude, Gemini etc.), and it returns an updated JSON you can import back with the <strong>Import</strong> button.`;
  el.appendChild(intro);

  const grid = document.createElement('div');
  grid.className = 'prompt-grid';

  PROMPTS.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'prompt-card';

    let customTextarea = '';
    if (p.custom) {
      customTextarea = `<textarea id="custom-prompt-text" placeholder="e.g. Add a day trip to Nikko on day 5..." style="width:100%;background:var(--gray6);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--dark);resize:vertical;min-height:80px;font-family:'DM Sans',sans-serif;margin-bottom:12px;outline:none;-webkit-appearance:none;"></textarea>`;
    }

    card.innerHTML = `
      <div class="prompt-card-header">
        <div class="prompt-icon" style="background:${p.iconBg}">${p.icon}</div>
        <div>
          <div class="prompt-card-title">${p.title}</div>
          <div class="prompt-card-desc">${p.desc}</div>
        </div>
      </div>
      <div class="prompt-card-body">
        ${p.custom ? customTextarea : `<div class="prompt-preview" id="preview-${i}">${esc(p.build().substring(0, 280))}</div>`}
        <button class="copy-btn" id="copy-btn-${i}">Copy Prompt</button>
      </div>`;

    card.querySelector(`#copy-btn-${i}`).addEventListener('click', function() {
      const text = p.custom
        ? p.build(document.getElementById('custom-prompt-text')?.value || '')
        : p.build();
      navigator.clipboard.writeText(text).then(() => {
        this.textContent = '✓ Copied!';
        this.classList.add('copied');
        setTimeout(() => { this.textContent = 'Copy Prompt'; this.classList.remove('copied'); }, 2000);
      }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text; ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0;';
        document.body.appendChild(ta); ta.focus(); ta.select();
        try { document.execCommand('copy'); } catch {}
        document.body.removeChild(ta);
        this.textContent = '✓ Copied!'; this.classList.add('copied');
        setTimeout(() => { this.textContent = 'Copy Prompt'; this.classList.remove('copied'); }, 2000);
      });
    });

    grid.appendChild(card);
  });

  el.appendChild(grid);
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  try {
    loadState();
    render();
  } catch(e) {
    console.error('Init error:', e);
    document.getElementById('days-container').innerHTML =
      '<div style="padding:40px;text-align:center;color:#94a3b8;font-family:monospace;font-size:13px">Error loading planner: ' + e.message + '</div>';
  }
});
