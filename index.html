<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Itinerary V15</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; font-family: sans-serif; }
        .cb { width: 22px; height: 22px; cursor: pointer; }
        .me-cb { accent-color: #2563eb; }
        .her-cb { accent-color: #db2777; }
        .st { text-decoration: line-through; color: #cbd5e1; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-8 text-center">
            <input type="text" id="m-title" value="🇯🇵 JAPAN 2026" oninput="saveAll()" class="bg-transparent text-4xl font-black text-red-600 text-center w-full outline-none">
            <p class="text-slate-400 font-bold text-[10px] tracking-widest mt-2 uppercase">V15 - MOBILE READY</p>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mt-8">
                <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-200"><span class="text-[9px] font-black text-slate-400 uppercase block">Total</span><span id="s-total" class="text-lg font-black">$0.00</span></div>
                <div class="bg-blue-50 p-4 rounded-3xl shadow-sm border border-blue-100"><span class="text-[9px] font-black text-blue-500 uppercase block">Me</span><span id="s-me" class="text-lg font-black text-blue-600">$0.00</span></div>
                <div class="bg-pink-50 p-4 rounded-3xl shadow-sm border border-pink-100"><span class="text-[9px] font-black text-pink-500 uppercase block">Partner</span><span id="s-her" class="text-lg font-black text-pink-600">$0.00</span></div>
                <div class="bg-red-50 p-4 rounded-3xl shadow-sm border border-red-100"><span class="text-[9px] font-black text-red-500 uppercase block">Left</span><span id="s-owed" class="text-lg font-black text-red-600">$0.00</span></div>
            </div>
            <div class="flex justify-center gap-2 mt-6">
                <button onclick="exportJSON()" class="bg-slate-800 text-white px-4 py-2 rounded-xl text-[10px] font-black shadow-lg">📥 EXPORT</button>
                <label class="bg-white border-2 border-slate-200 px-4 py-2 rounded-xl text-[10px] font-black cursor-pointer shadow-sm">📤 IMPORT<input type="file" class="hidden" onchange="importJSON(event)"></label>
            </div>
        </header>
        <div id="list" class="space-y-8"></div>
    </div>
    <script>
        const AI_DB = {"Flight": "Tip: Keep passport/boarding pass handy for duty-free.", "APA Hotel": "Small but highly efficient. Great tubs!", "Team labs": "Wear shorts! You will walk through water.", "Round 1": "Try the Spo-Cha floor for unlimited games.", "Kawaguchiko": "Best morning Fuji views by the lake.", "Kachi Kachi": "Amazing ropeway views of the mountain.", "Koko Hotel": "Modern station hotel. Try local Gyoza.", "Aoba Oden": "Dark broth oden is a Shizuoka must-try.", "Nihondaira": "Ultimate tea field and Fuji photo spot.", "Tea Farm": "Try the Matcha ice cream!", "Nara": "The deer will bow back if you bow!", "Hozugawa": "Traditional boat ride through rapids.", "Piece Hostel": "High-end design and great social bar.", "7-Eleven": "The egg salad sandwiches are legendary.", "Don Quijote": "Bring passport for tax-free shopping.", "Shinkansen": "The bullet train is extremely punctual."};
        let data = JSON.parse(localStorage.getItem('j-v15-data')) || [{"day": "Day 1", "date": "Sat 25th", "title": "MELBOURNE TO JAPAN", "details": [{"text": "Flight JQ34", "cost": 0, "paidMe": false, "paidPartner": false, "info": ""}, {"text": "APA Hotel", "cost": 0, "paidMe": false, "paidPartner": false, "info": ""}]}, {"day": "Day 2", "date": "Sun 26th", "title": "TOKYO", "details": []}, {"day": "Day 3", "date": "Mon 27th", "title": "TOKYO", "details": [{"text": "Team labs", "cost": 0, "paidMe": false, "paidPartner": false, "info": ""}, {"text": "Round 1", "cost": 0, "paidMe": false, "paidPartner": false, "info": ""}]}, {"day": "Day 4", "date": "Tue 28th", "title": "TOKYO", "details": []}, {"day": "Day 5", "date": "Wed 29th", "title": "TOKYO - KAWAGUCHI", "details": [{"text": "Kawaguchiko Hotel", "cost": 0, "paidMe": false, "paidPartner": false, "info": ""}, {"text": "Kachi Kachi Ropeway", "cost": 0, "paidMe": false, "paidPartner": false, "info": ""}]}, {"day": "Day 7", "date": "Fri 1st", "title": "SHIZUOKA", "details": [{"text": "Koko Hotel", "cost": 304, "paidMe": false, "paidPartner": false, "info": ""}, {"text": "Aoba Oden", "cost": 0, "paidMe": false, "paidPartner": false, "info": ""}]}, {"day": "Day 9", "date": "Sun 3rd", "title": "KYOTO", "details": [{"text": "Piece Hostel", "cost": 0, "paidMe": false, "paidPartner": false, "info": ""}]}];
        let title = localStorage.getItem('j-v15-title') || "🇯🇵 JAPAN 2026";
        document.getElementById('m-title').value = title;
        function saveAll() { localStorage.setItem('j-v15-data', JSON.stringify(data)); localStorage.setItem('j-v15-title', document.getElementById('m-title').value); calc(); }
        function calc() { let t=0, m=0, h=0, paid=0; data.forEach(d => { d.details.forEach(i => { let c = parseFloat(i.cost || 0); t += c; if(i.paidMe && i.paidPartner) { m+=c/2; h+=c/2; paid+=c; } else if(i.paidMe) { m+=c; paid+=c; } else if(i.paidPartner) { h+=c; paid+=c; } }); }); document.getElementById('s-total').innerText = '$' + t.toFixed(2); document.getElementById('s-me').innerText = '$' + m.toFixed(2); document.getElementById('s-her').innerText = '$' + h.toFixed(2); document.getElementById('s-owed').innerText = '$' + (t-paid).toFixed(2); }
        function updateD(d, f, v) { data[d][f] = v; saveAll(); }
        function updateI(d, i, f, v) { if(f === 'cost') data[d].details[i][f] = parseFloat(v) || 0; else data[d].details[i][f] = v; render(); saveAll(); }
        function toggle(d, i, f, e) { e.stopPropagation(); data[d].details[i][f] = !data[d].details[i][f]; render(); saveAll(); }
        function syncAI(d, i) { const name = data[d].details[i].text.toLowerCase(); let match = null; for(let key in AI_DB) { if(name.includes(key.toLowerCase())) match = AI_DB[key]; } alert(match || "No tips found."); }
        function addI(d) { data[d].details.push({ text: "New Item", cost: 0, paidMe: false, paidPartner: false, info: "" }); render(); saveAll(); }
        function render() {
            const list = document.getElementById('list'); list.innerHTML = '';
            data.forEach((day, dIdx) => {
                const card = document.createElement('div'); card.className = "bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden";
                let rows = day.details.map((item, iIdx) => `
                    <div class="border-b border-slate-50 p-4 flex items-center gap-3">
                        <input type="checkbox" class="cb me-cb" ${item.paidMe ? 'checked' : ''} onclick="toggle(${dIdx}, ${iIdx}, 'paidMe', event)">
                        <input type="checkbox" class="cb her-cb" ${item.paidPartner ? 'checked' : ''} onclick="toggle(${dIdx}, ${iIdx}, 'paidPartner', event)">
                        <div class="flex-1">
                            <input type="text" value="${item.text}" oninput="updateI(${dIdx}, ${iIdx}, 'text', this.value)" class="w-full font-bold text-xs bg-transparent border-none outline-none ${item.paidMe || item.paidPartner ? 'st' : ''}">
                        </div>
                        <input type="number" value="${item.cost}" oninput="updateI(${dIdx}, ${iIdx}, 'cost', this.value)" class="w-16 font-mono font-black text-right text-xs bg-transparent border-none outline-none">
                    </div>
                `).join('');
                card.innerHTML = `<div class="bg-slate-50 p-4 border-b border-slate-100 flex justify-between items-center"><div><div class="text-[8px] font-black text-red-600 uppercase">${day.day}</div><div class="font-black text-slate-800">${day.title}</div></div><button onclick="addI(${dIdx})" class="w-8 h-8 rounded-full bg-white border border-slate-200 font-bold">+</button></div><div>${rows}</div>`;
                list.appendChild(card);
            });
        }
        function exportJSON() { const blob = new Blob([JSON.stringify(data)], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "trip.json"; a.click(); }
        function importJSON(e) { const r = new FileReader(); r.onload = (ev) => { data = JSON.parse(ev.target.result); render(); saveAll(); }; r.readAsText(e.target.files[0]); }
        render(); calc();
    </script>
</body>
</html>
