<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Master Itinerary V18</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; font-family: sans-serif; }
        .cb { width: 22px; height: 22px; cursor: pointer; border-radius: 6px; }
        .me-cb { accent-color: #2563eb; }
        .her-cb { accent-color: #db2777; }
        .st { text-decoration: line-through; color: #cbd5e1; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-8 text-center">
            <input type="text" id="m-title" value="🇯🇵 JAPAN 2026" oninput="saveAll()" class="bg-transparent text-4xl font-black text-red-600 text-center w-full outline-none">
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mt-8">
                <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-200 text-left">
                    <span class="text-[9px] font-black text-slate-400 uppercase block">Total</span>
                    <span id="s-total" class="text-lg font-black">$0.00</span>
                </div>
                <div class="bg-blue-50 p-4 rounded-3xl shadow-sm border border-blue-100 text-left">
                    <span class="text-[9px] font-black text-blue-500 uppercase block">Joe Paid</span>
                    <span id="s-me" class="text-lg font-black text-blue-600">$0.00</span>
                </div>
                <div class="bg-pink-50 p-4 rounded-3xl shadow-sm border border-pink-100 text-left">
                    <span class="text-[9px] font-black text-pink-500 uppercase block">Partner Paid</span>
                    <span id="s-her" class="text-lg font-black text-pink-600">$0.00</span>
                </div>
                <div class="bg-red-50 p-4 rounded-3xl shadow-sm border border-red-100 text-left">
                    <span class="text-[9px] font-black text-red-500 uppercase block">Owed</span>
                    <span id="s-owed" class="text-lg font-black text-red-600">$0.00</span>
                </div>
            </div>

            <div class="flex justify-center gap-2 mt-6">
                <button onclick="exportJSON()" class="bg-slate-800 text-white px-4 py-2 rounded-xl text-[10px] font-black shadow-lg">📥 EXPORT BACKUP</button>
                <label class="bg-white border-2 border-slate-200 px-4 py-2 rounded-xl text-[10px] font-black cursor-pointer shadow-sm">
                    📤 IMPORT JSON
                    <input type="file" class="hidden" onchange="importJSON(event)">
                </label>
            </div>
        </header>

        <div id="list" class="space-y-8"></div>

        <div class="mt-12 p-8 bg-slate-900 rounded-[2.5rem] text-white shadow-2xl border-t-4 border-blue-500">
             <div class="flex items-center gap-3 mb-4">
                <div id="sync-dot" class="w-2 h-2 bg-slate-500 rounded-full"></div>
                <h3 class="text-xs font-black uppercase tracking-widest">Live Partner Sync</h3>
             </div>
             <div class="flex flex-col md:flex-row gap-3">
                <input type="text" id="trip-key" placeholder="Enter a secret Trip Key" class="flex-1 bg-slate-800 border-none rounded-2xl p-4 text-sm outline-none text-blue-400 font-mono">
                <button onclick="initCloud()" class="bg-blue-600 hover:bg-blue-500 px-8 py-4 rounded-2xl text-[10px] font-black tracking-widest uppercase">Connect Devices</button>
             </div>
             <p id="sync-status" class="text-[9px] text-slate-500 mt-4 uppercase font-bold tracking-widest text-center">Cloud Sync Offline</p>
        </div>
    </div>

    <script>
        const API_URL = "https://kvbin.com/api/v1/bins/";
        let tripId = localStorage.getItem('tripId') || "";
        
        let data = JSON.parse(localStorage.getItem('j-v18-data')) || [
            {"day": "Day 1", "date": "Sat 25th April", "title": "MELBOURNE TO TOKYO", "details": [{"text": "Flight JQ34 - JQ25", "cost": 0.0, "paidMe": false, "paidPartner": false}, {"text": "APA Hotel Higashi Shinjuku", "cost": 0.0, "paidMe": false, "paidPartner": false}]},
            {"day": "Day 2", "date": "Sun 26th April", "title": "TOKYO EXPLORATION", "details": []},
            {"day": "Day 3", "date": "Mon 27th April", "title": "TOKYO - ART & GAMES", "details": [{"text": "Team labs - Planets", "cost": 0.0, "paidMe": false, "paidPartner": false}, {"text": "Round 1 Arcade", "cost": 0.0, "paidMe": false, "paidPartner": false}]},
            {"day": "Day 4", "date": "Tue 28th April", "title": "TOKYO", "details": [{"text": "Go see punch", "cost": 0.0, "paidMe": false, "paidPartner": false}]},
            {"day": "Day 5", "date": "Wed 29th April", "title": "TOKYO TO KAWAGUCHIKO", "details": [{"text": "Kawaguchiko Lakeside Hotel", "cost": 0.0, "paidMe": false, "paidPartner": false}, {"text": "Kachi Kachi Ropeway", "cost": 0.0, "paidMe": false, "paidPartner": false}]},
            {"day": "Day 6", "date": "Thu 30th April", "title": "LAKE KAWAGUCHI", "details": []},
            {"day": "Day 7", "date": "Fri 1st May", "title": "KAWAGUCHI TO SHIZUOKA", "details": [{"text": "Koko Hotel Shizuoka", "cost": 304.0, "paidMe": false, "paidPartner": false}, {"text": "Aoba Oden Alley", "cost": 0.0, "paidMe": false, "paidPartner": false}, {"text": "Nihondaira Plateau", "cost": 0.0, "paidMe": false, "paidPartner": false}, {"text": "Tea Farm Visit", "cost": 0.0, "paidMe": false, "paidPartner": false}]},
            {"day": "Day 8", "date": "Sat 2nd May", "title": "SHIZUOKA", "details": [{"text": "Miho no Matsubara", "cost": 0.0, "paidMe": false, "paidPartner": false}]},
            {"day": "Day 9", "date": "Sun 3rd May", "title": "SHIZUOKA TO KYOTO", "details": [{"text": "Piece Hostel Kyoto", "cost": 0.0, "paidMe": false, "paidPartner": false}]},
            {"day": "Day 10", "date": "Mon 4th May", "title": "KYOTO - NARA DAY TRIP", "details": [{"text": "Nara Deer Park", "cost": 0.0, "paidMe": false, "paidPartner": false}]},
            {"day": "Day 11", "date": "Tue 5th May", "title": "KYOTO - RIVER BOAT", "details": [{"text": "Hozugawa River Boat Tour", "cost": 0.0, "paidMe": false, "paidPartner": false}]},
            {"day": "Day 12", "date": "Wed 6th May", "title": "KYOTO", "details": []},
            {"day": "Day 13", "date": "Thu 7th May", "title": "KYOTO", "details": []},
            {"day": "Day 14", "date": "Fri 8th May", "title": "KYOTO TO OSAKA", "details": []},
            {"day": "Day 15", "date": "Sat 9th May", "title": "OSAKA TO CAIRNS", "details": [{"text": "Flight JQ16", "cost": 0.0, "paidMe": false, "paidPartner": false}]},
            {"day": "Day 16", "date": "Sun 10th May", "title": "CAIRNS TO MELBOURNE", "details": [{"text": "Flight Home", "cost": 0.0, "paidMe": false, "paidPartner": false}]}
        ];

        function saveAll() {
            localStorage.setItem('j-v18-data', JSON.stringify(data));
            calc();
            pushData();
        }

        async function initCloud() {
            const key = document.getElementById('trip-key').value.trim();
            if(!key) return alert("Enter a key!");
            tripId = key;
            localStorage.setItem('tripId', key);
            document.getElementById('sync-status').innerText = "Connecting...";
            await pullData();
            setInterval(pullData, 5000); 
        }

        async function pushData() {
            if(!tripId) return;
            try {
                await fetch(API_URL + tripId, { method: 'POST', body: JSON.stringify(data), headers: { 'Content-Type': 'application/json' } });
                document.getElementById('sync-status').innerText = "Cloud Synced ✅";
                document.getElementById('sync-dot').className = "w-2 h-2 bg-green-500 animate-pulse";
            } catch(e) {}
        }

        async function pullData() {
            if(!tripId) return;
            try {
                const res = await fetch(API_URL + tripId);
                if(res.ok) {
                    const remoteData = await res.json();
                    if(JSON.stringify(remoteData) !== JSON.stringify(data)) {
                        data = remoteData;
                        render();
                        calc();
                    }
                    document.getElementById('sync-status').innerText = "Cloud Synced ✅";
                    document.getElementById('sync-dot').className = "w-2 h-2 bg-green-500";
                }
            } catch(e) {}
        }

        function calc() {
            let t=0, m=0, h=0, paid=0;
            data.forEach(d => {
                d.details.forEach(i => {
                    let c = parseFloat(i.cost || 0); t += c;
                    if(i.paidMe && i.paidPartner) { m+=c/2; h+=c/2; paid+=c; }
                    else if(i.paidMe) { m+=c; paid+=c; }
                    else if(i.paidPartner) { h+=c; paid+=c; }
                });
            });
            document.getElementById('s-total').innerText = '$' + t.toFixed(2);
            document.getElementById('s-me').innerText = '$' + m.toFixed(2);
            document.getElementById('s-her').innerText = '$' + h.toFixed(2);
            document.getElementById('s-owed').innerText = '$' + (t-paid).toFixed(2);
        }

        function toggle(d, i, f, e) {
            e.stopPropagation();
            data[d].details[i][f] = !data[d].details[i][f];
            render(); saveAll();
        }

        function updateI(d, i, f, v) {
            data[d].details[i][f] = (f === 'cost') ? parseFloat(v) || 0 : v;
            calc(); saveAll();
        }

        function addI(d) {
            data[d].details.push({ text: "New Activity", cost: 0, paidMe: false, paidPartner: false });
            render(); saveAll();
        }

        function render() {
            const list = document.getElementById('list');
            list.innerHTML = '';
            data.forEach((day, dIdx) => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden";
                let rows = day.details.map((item, iIdx) => `
                    <div class="border-b border-slate-50 last:border-0 p-5 flex items-center gap-3">
                        <div class="flex gap-1.5">
                            <input type="checkbox" class="cb me-cb" ${item.paidMe ? 'checked' : ''} onclick="toggle(${dIdx}, ${iIdx}, 'paidMe', event)">
                            <input type="checkbox" class="cb her-cb" ${item.paidPartner ? 'checked' : ''} onclick="toggle(${dIdx}, ${iIdx}, 'paidPartner', event)">
                        </div>
                        <input type="text" value="${item.text}" onchange="updateI(${dIdx}, ${iIdx}, 'text', this.value)" class="flex-1 font-bold text-xs outline-none bg-transparent ${item.paidMe || item.paidPartner ? 'st' : ''}">
                        <input type="number" value="${item.cost}" onchange="updateI(${dIdx}, ${iIdx}, 'cost', this.value)" class="w-14 font-mono font-black text-right text-xs bg-transparent outline-none">
                    </div>
                `).join('');
                card.innerHTML = `
                    <div class="bg-slate-50/80 px-6 py-4 border-b border-slate-100 flex justify-between items-center">
                        <div>
                            <span class="text-red-600 font-black text-[9px] uppercase tracking-widest">${day.day}</span>
                            <h2 class="font-black text-slate-800 text-sm uppercase">${day.title}</h2>
                        </div>
                        <button onclick="addI(${dIdx})" class="text-slate-400 font-bold">+</button>
                    </div>
                    <div>${rows || '<div class="p-6 text-center text-slate-300 text-[10px] font-black uppercase">No plans set</div>'}</div>
                `;
                list.appendChild(card);
            });
        }

        function exportJSON() {
            const blob = new Blob([JSON.stringify(data)], {type:'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "japan_trip_backup.json"; a.click();
        }

        function importJSON(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                data = JSON.parse(ev.target.result);
                render(); saveAll();
            };
            reader.readAsText(e.target.files[0]);
        }

        if(
